<!DOCTYPE html>
<html>
<head>
  <title>Your Last Day</title>

  <style>
    body { font-family: Arial; text-align: center; margin-top: 40px; }

    input { padding: 6px; margin: 5px; }

    .bar {
      width: 80%;
      height: 30px;
      margin: 15px auto;
      display: flex;
      background: #eee;
    }

    .seg { height:100%; }

    #pastLife { background:#9e9e9e; }
    #workLife { background:#f44336; }
    #retireLife { background:#4caf50; }

    #workRemain { background:#f44336; }
    #retireRemain { background:#4caf50; }
    #sleepRemain { background:#9c27b0; }

    .desc {
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    table {
      margin: 30px auto;
      border-collapse: collapse;
    }

    td {
      border: 1px solid #ccc;
      padding: 8px 12px;
    }

    #celebBox, #famousBox, #birthBox {
      position: fixed;
      bottom: 20px;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      width: 260px;
    }

    #celebBox { right: 20px; }
    #famousBox { right: 300px; }
    #birthBox { left: 20px; }
  </style>
</head>

<body>

<h1>Your Last Day</h1>

<input type="date" id="birthday" value="1990-01-01">

<h2 id="countdown"></h2>

<!-- TOTAL LIFE -->
<h3>Total Life</h3>
<div class="bar">
  <div id="pastLife" class="seg"></div>
  <div id="workLife" class="seg"></div>
  <div id="retireLife" class="seg"></div>
</div>
<div class="desc">
⬜ Past life | 🟥 Work | 🟩 Retirement
</div>

<!-- REMAINING LIFE -->
<h3>Remaining Life</h3>
<div class="bar">
  <div id="workRemain" class="seg"></div>
  <div id="retireRemain" class="seg"></div>
  <div id="sleepRemain" class="seg"></div>
</div>
<div class="desc">
🟥 Work | 🟩 Life | 🟪 Sleep
</div>

<table>
<tr><td>Total days left</td><td id="totaldays"></td></tr>
<tr><td>Workdays left</td><td id="workdays"></td></tr>
<tr><td>Sundays left</td><td id="sundays"></td></tr>

<tr><td>Teeth lost</td><td id="teeth"></td></tr>
<tr><td>Teeth remaining</td><td id="teethLeft"></td></tr>
<tr><td>Hair growth remaining</td><td id="hair"></td></tr>

<tr><td>PMs lived</td><td id="pmsPast"></td></tr>
<tr><td>PMs remaining</td><td id="pmsFuture"></td></tr>
</table>

<div id="famousBox">
  <h4>Interesting People</h4>
  <table id="famousTable"></table>
  <button onclick="shufflePeople()">Shuffle</button>
</div>

<div id="celebBox">
  <h4>Most Impactful Death</h4>
  <div id="impactfulDeath"></div>

  <h4>You’ve Outlived</h4>
  <table id="celebTable"></table>
</div>

<div id="birthBox">
  <h4>Your Birth Day</h4>
  <div id="birthFacts"></div>
</div>

<script>

// DATA
const celebrities = [
  {name:"Matthew Perry", age:54},
  {name:"Avicii", age:28},
  {name:"Kobe Bryant", age:41},
  {name:"Juice WRLD", age:21},
  {name:"Heath Ledger", age:28}
];

const impactfulPeople = [
  {name:"Queen Elizabeth II", died:2022},
  {name:"Michael Jackson", died:2009},
  {name:"Princess Diana", died:1997},
  {name:"Kobe Bryant", died:2020}
];

const interestingPeople = [
  {name:"Steve Jobs", born:1955, died:2011},
  {name:"Amy Winehouse", born:1983, died:2011},
  {name:"Freddie Mercury", born:1946, died:1991},
  {name:"Kobe Bryant", born:1978, died:2020},
  {name:"Avicii", born:1989, died:2018},
  {name:"Juice WRLD", born:1998, died:2019}
];

const primeMinisters = [
  {start:"1997"}, {start:"2007"}, {start:"2010"},
  {start:"2016"}, {start:"2019"}, {start:"2022"}
];

let cachedPeople=[];

// helpers
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
function pad(n){ return n.toString().padStart(2,"0"); }

// birth panel
function renderBirthFacts(year){
  document.getElementById("birthFacts").innerHTML =
    `🎂 Born in ${year}<br>
     🎲 Internet era growing<br>
     🎲 Technology evolving`;
}

// update
function update(){

  const birth = new Date(document.getElementById("birthday").value);
  const now = new Date();

  const lifespan = 79;
  const death = new Date(birth);
  death.setFullYear(death.getFullYear()+lifespan);

  const retire = new Date(birth);
  retire.setFullYear(retire.getFullYear()+67);

  const totalLife = death - birth;
  const lived = now - birth;
  const remaining = death - now;

  const workRemaining = Math.max(0, retire - now);
  const retireRemaining = Math.max(0, death - Math.max(now, retire));

  // countdown (FIXED)
  const d = Math.floor(remaining/86400000);
  const h = Math.floor((remaining/3600000)%24);
  const m = Math.floor((remaining/60000)%60);
  const s = Math.floor((remaining/1000)%60);

  document.getElementById("countdown").innerText =
    `${d} days ${pad(h)}:${pad(m)}:${pad(s)}`;

  // bars
  document.getElementById("pastLife").style.width = (lived/totalLife*100)+"%";
  document.getElementById("workLife").style.width = (workRemaining/totalLife*100)+"%";
  document.getElementById("retireLife").style.width = (retireRemaining/totalLife*100)+"%";

  document.getElementById("workRemain").style.width = (workRemaining/remaining*100)+"%";
  document.getElementById("retireRemain").style.width = (retireRemaining/remaining*100)+"%";
  document.getElementById("sleepRemain").style.width = "33%";

  const days = Math.floor(remaining/86400000);

  document.getElementById("totaldays").innerText = days;
  document.getElementById("workdays").innerText = Math.floor(days*5/7);
  document.getElementById("sundays").innerText = Math.floor(days/7);

  const yearsLeft = remaining/(1000*60*60*24*365);

  document.getElementById("teeth").innerText = (yearsLeft*0.1).toFixed(1);
  document.getElementById("teethLeft").innerText = (32-yearsLeft*0.1).toFixed(0);
  document.getElementById("hair").innerText = (yearsLeft*0.15).toFixed(2)+" m";

  // PMs
  let pmsPast=0;
  primeMinisters.forEach(pm=>{
    if(new Date(pm.start)<now) pmsPast++;
  });

  const yearsLived=(now-birth)/(365*24*60*60*1000);

  document.getElementById("pmsPast").innerText=pmsPast;
  document.getElementById("pmsFuture").innerText=Math.floor((pmsPast/yearsLived)*yearsLeft);

  // impactful death
  const impact = impactfulPeople.find(p=>p.died>=birth.getFullYear());
  if(impact){
    document.getElementById("impactfulDeath").innerHTML =
      `<b>${impact.name}</b><br>You were ${impact.died-birth.getFullYear()}`;
  }

  // interesting people
  if(cachedPeople.length===0){
    cachedPeople = shuffle(interestingPeople).slice(0,5);
  }

  const fTable=document.getElementById("famousTable");
  fTable.innerHTML="<tr><th>Name</th><th>Context</th></tr>";
  cachedPeople.forEach(p=>{
    fTable.innerHTML+=`<tr><td>${p.name}</td><td>You were ${p.died-birth.getFullYear()}</td></tr>`;
  });

  // celebs
  const cTable=document.getElementById("celebTable");
  cTable.innerHTML="<tr><th>Name</th><th>Age</th></tr>";

  const age = now.getFullYear()-birth.getFullYear();
  let younger = celebrities.filter(c=>c.age<age);
  if(younger.length<5) younger=celebrities;

  younger.slice(0,5).forEach(c=>{
    cTable.innerHTML+=`<tr><td>${c.name}</td><td>${c.age}</td></tr>`;
  });
}

// shuffle
function shufflePeople(){
  cachedPeople = shuffle(interestingPeople).slice(0,5);
}

// DOB change
document.getElementById("birthday").addEventListener("input", ()=>{
  cachedPeople=[];
  renderBirthFacts(new Date(document.getElementById("birthday").value).getFullYear());
  update();
});

// init
renderBirthFacts(new Date(document.getElementById("birthday").value).getFullYear());
setInterval(update,1000);

</script>

</body>
</html>
